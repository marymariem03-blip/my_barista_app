name: my_barista_app
description: "Barista's — The coffee specialist app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0

  # ── UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1          

  # ── Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # ── State & Utils
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  uuid: ^4.5.1

  # ── Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1

  # ── Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/branches/
    - assets/images/games_card/
    - assets/icons/

  fonts:
    - family: LeagueSpartan
      fonts:
        - asset: assets/fonts/LeagueSpartan-Regular.ttf
          weight: 400
        - asset: assets/fonts/LeagueSpartan-Bold.ttf
          weight: 700
        - asset: assets/fonts/LeagueSpartan-Black.ttf
          weight: 900